interface:
  display_name: "Start"
  short_description: "Start and actively sync a Linear ticket"
  default_prompt: "Use $start TICKET-123 to start a Linear issue, begin implementing it in this workspace, and keep the ticket updated as plans are approved, edits land, subagents finish, and commits are made."

dependencies:
  tools:
    - type: "mcp"
      value: "linear"
      description: "Linear MCP server"
      transport: "streamable_http"
      url: "https://mcp.linear.app/mcp"
